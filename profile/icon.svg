<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="arbiterForge">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0f14"/><stop offset="0.55" stop-color="#131a23"/><stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
    <radialGradient id="ember" cx="0" cy="0" r="1" gradientTransform="translate(256 250) rotate(-90) scale(210)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e3b341" stop-opacity="0.26"/><stop offset="1" stop-color="#e3b341" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="anvil" x1="128" y1="300" x2="384" y2="444" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2a313d"/><stop offset="1" stop-color="#161b24"/>
    </linearGradient>
    <linearGradient id="check" x1="206" y1="168" x2="316" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0b35a"/><stop offset="1" stop-color="#d29922"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <rect width="512" height="512" rx="104" fill="url(#ember)"/>
  <rect x="6" y="6" width="500" height="500" rx="98" fill="none" stroke="#e3b341" stroke-opacity="0.18" stroke-width="2"/>

  <!-- the verdict: a forged check, rising as a spark -->
  <path d="M198 214 l44 46 l82 -94" fill="none" stroke="url(#check)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ember sparks -->
  <g fill="#e3b341">
    <circle cx="168" cy="262" r="6"/>
    <circle cx="348" cy="256" r="5"/>
    <circle cx="206" cy="284" r="4"/>
  </g>
  <g fill="#f0d68a">
    <path d="M360 296 l3.5 9 l9 3.5 l-9 3.5 l-3.5 9 l-3.5 -9 l-9 -3.5 l9 -3.5 z"/>
    <path d="M150 300 l2.6 6.6 l6.6 2.6 l-6.6 2.6 l-2.6 6.6 l-2.6 -6.6 l-6.6 -2.6 l6.6 -2.6 z"/>
  </g>

  <!-- anvil -->
  <g stroke="#46505a" stroke-width="3" stroke-linejoin="round">
    <rect x="120" y="300" width="272" height="44" rx="9" fill="url(#anvil)"/>
    <path d="M392 307 L452 324 L392 341 Z" fill="url(#anvil)"/>
    <path d="M196 344 H316 L294 414 H218 Z" fill="url(#anvil)"/>
    <rect x="150" y="414" width="212" height="40" rx="9" fill="url(#anvil)"/>
  </g>
</svg>
